<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Правильный выбор</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      color: #fff;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      padding: 24px;
    }

    .card {
      max-width: 520px;
      text-align: center;
      padding: 48px 36px;
      border-radius: 16px;
      background: linear-gradient(145deg, rgba(34, 197, 94, 0.12), rgba(16, 185, 129, 0.06));
      border: 1px solid rgba(34, 197, 94, 0.35);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      animation: fadeIn 0.6s ease;
    }

    .emoji {
      font-size: 56px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 12px;
      color: #86efac;
    }

    p {
      color: rgba(255, 255, 255, 0.65);
      line-height: 1.5;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="emoji">🎉</div>
    <h1>Ура, это правильный выбор!</h1>
    <p>Вы подписались на уведомления. Отличное решение!</p>
  </main>
</body>
</html>
