<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Неправильный выбор</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      color: #fff;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      padding: 24px;
    }

    .card {
      max-width: 520px;
      text-align: center;
      padding: 48px 36px;
      border-radius: 16px;
      background: linear-gradient(145deg, rgba(239, 68, 68, 0.12), rgba(220, 38, 38, 0.06));
      border: 1px solid rgba(239, 68, 68, 0.35);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      animation: fadeIn 0.6s ease;
    }

    .emoji {
      font-size: 56px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 12px;
      color: #fca5a5;
    }

    p {
      color: rgba(255, 255, 255, 0.65);
      line-height: 1.5;
      margin-bottom: 28px;
    }

    .back-btn {
      display: inline-block;
      padding: 14px 28px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(99, 102, 241, 0.35);
      transition: transform 0.15s ease;
    }

    .back-btn:hover {
      transform: translateY(-2px);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="emoji">😔</div>
    <h1>Неправильный выбор</h1>
    <p>Без уведомлений вы можете пропустить что-то важное. Попробуйте ещё раз!</p>
    <a class="back-btn" href="index.html">Вернуться назад</a>
  </main>
</body>
</html>
