<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Видеоигра</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      color: #fff;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    }

    .page {
      width: min(960px, 100vw - 32px);
    }

    .video-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #111;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.55);
    }

    video {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      background: #000;
    }

    .hint {
      margin-top: 16px;
      text-align: center;
      color: rgba(255, 255, 255, 0.45);
      font-size: 14px;
    }

    .choices {
      display: none;
      margin-top: 28px;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      animation: fadeIn 0.6s ease;
    }

    .choices.visible {
      display: flex;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .choice-btn {
      min-width: 220px;
      padding: 16px 28px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .choice-btn:hover {
      transform: translateY(-2px);
    }

    .choice-btn:active {
      transform: translateY(0);
    }

    .choice-btn--a {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      box-shadow: 0 8px 24px rgba(99, 102, 241, 0.35);
    }

    .choice-btn--b {
      background: linear-gradient(135deg, #0ea5e9, #06b6d4);
      color: #fff;
      box-shadow: 0 8px 24px rgba(14, 165, 233, 0.35);
    }

    .error {
      display: none;
      margin-top: 16px;
      padding: 14px 18px;
      border-radius: 10px;
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.35);
      color: #fca5a5;
      font-size: 14px;
      text-align: center;
    }

    .error.visible {
      display: block;
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="video-wrap">
      <video id="clip" playsinline controls>
        <source src="./video.mp4" type="video/mp4">
      </video>
    </div>

    <p class="hint" id="hint">Посмотрите клип до конца</p>

    <div class="error" id="error">
      Видео не загрузилось. Проверьте, что файл <strong>video.mp4</strong> загружен в репозиторий и сайт открыт через GitHub Pages, а не через страницу репозитория на github.com.
    </div>

    <div class="choices" id="choices">
      <button class="choice-btn choice-btn--a" type="button" data-choice="yes">
        Получать уведомление
      </button>
      <button class="choice-btn choice-btn--b" type="button" data-choice="no">
        Не получать
      </button>
    </div>
  </main>

  <script>
    const video = document.getElementById("clip");
    const choices = document.getElementById("choices");
    const hint = document.getElementById("hint");
    const error = document.getElementById("error");

    video.addEventListener("error", () => {
      error.classList.add("visible");
      hint.textContent = "";
    });

    video.addEventListener("ended", () => {
      choices.classList.add("visible");
      hint.textContent = "Выберите вариант";
    });

    choices.addEventListener("click", async (event) => {
      const button = event.target.closest("[data-choice]");
      if (!button) return;

      if (button.dataset.choice === "yes") {
        if ("Notification" in window) {
          await Notification.requestPermission();
        }
        window.location.href = "correct.html";
        return;
      }

      window.location.href = "wrong.html";
    });
  </script>
</body>
</html>
